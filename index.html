<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Disc Pack Creator PRO</title>
    <!-- Thư viện nén ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Font chữ Minecraft -->
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        :root {
            --mc-gui-bg: #c6c6c6;
            --mc-panel-bg: #8b8b8b;
            --mc-border-dark: #585858;
            --mc-border-light: #ffffff;
            --mc-green: #3c8527;
            --mc-green-hover: #5fb343;
            --mc-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://minecraft.wiki/images/Panorama_1.21.0.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Minecraftia', sans-serif;
            color: #3f3f3f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            image-rendering: pixelated;
        }

        .container {
            background-color: var(--mc-gui-bg);
            border: 4px solid #000;
            border-top-color: var(--mc-border-light);
            border-left-color: var(--mc-border-light);
            border-right-color: var(--mc-border-dark);
            border-bottom-color: var(--mc-border-dark);
            width: 95%;
            max-width: 480px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 1rem;
            text-transform: uppercase;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .panel {
            background: var(--mc-panel-bg);
            border: 3px solid #373737;
            border-top-color: #555;
            border-left-color: #555;
            padding: 15px;
            margin-bottom: 15px;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 5px;
            color: #111;
            font-weight: bold;
        }

        input[type="text"], select {
            width: 100%;
            background: #000;
            border: 2px solid #fff;
            padding: 12px;
            color: #3cf03c;
            font-family: 'Minecraftia', sans-serif;
            box-sizing: border-box;
            outline: none;
            font-size: 0.8rem;
        }

        .disc-preview-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .item-frame {
            width: 70px;
            height: 70px;
            background: url('https://minecraft.wiki/images/Item_Frame_%28item%29_JE2_BE2.png');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .disc-icon {
            width: 50px;
            height: 50px;
            image-rendering: pixelated;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            background: #7a7a7a;
            border: 3px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.7rem;
            box-sizing: border-box;
            color: #fff;
            text-shadow: 1px 1px 0px #000;
        }

        .file-upload-btn:hover { background: #8e8e8e; }
        input[type="file"] { display: none; }

        .btn-craft {
            width: 100%;
            background-color: var(--mc-green);
            border: 4px solid #000;
            border-top-color: #5fb343;
            border-left-color: #5fb343;
            color: white;
            font-family: 'Minecraftia', sans-serif;
            padding: 18px;
            font-size: 1.1rem;
            cursor: pointer;
            text-shadow: 2px 2px 0px #1a3a11;
            margin-top: 5px;
        }

        .btn-craft:hover { background-color: var(--mc-green-hover); }
        .btn-craft:active {
            border: 4px solid #fff;
            border-top-color: #000;
            border-left-color: #000;
            transform: translateY(2px);
        }

        .status {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 12px;
            height: 18px;
            color: #444;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.6rem;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CRAFTING TABLE: MUSIC DISC</h1>

    <div class="panel">
        <div class="field">
            <label>TÊN GÓI (PACK NAME):</label>
            <input type="text" id="packName" placeholder="Nhập tên pack...">
        </div>

        <div class="field">
            <label>PHIÊN BẢN (MINECRAFT VERSION):</label>
            <select id="versionSelect">
                <option value="1.21.0">1.21 (Tricky Trials)</option>
                <option value="1.20.0">1.20 (Trails & Tales)</option>
                <option value="1.19.0">1.19 (The Wild Update)</option>
                <option value="1.18.0">1.18 (Caves & Cliffs P2)</option>
                <option value="1.17.0">1.17 (Caves & Cliffs P1)</option>
                <option value="1.16.0">1.16 (Nether Update)</option>
            </select>
        </div>

        <div class="field">
            <label>ĐĨA THAY THẾ (TARGET DISC):</label>
            <div class="disc-preview-container">
                <div class="item-frame">
                    <img id="discPreview" src="https://minecraft.wiki/images/Music_Disc_13_JE2_BE2.png" class="disc-icon">
                </div>
                <select id="discSelect">
                    <option value="13" data-url="13_JE2_BE2">Disc 13</option>
                    <option value="cat" data-url="Cat_JE2_BE2">Disc Cat</option>
                    <option value="blocks" data-url="Blocks_JE2_BE2">Disc Blocks</option>
                    <option value="chirp" data-url="Chirp_JE2_BE2">Disc Chirp</option>
                    <option value="far" data-url="Far_JE2_BE2">Disc Far</option>
                    <option value="mall" data-url="Mall_JE2_BE2">Disc Mall</option>
                    <option value="mellohi" data-url="Mellohi_JE2_BE2">Disc Mellohi</option>
                    <option value="stal" data-url="Stal_JE2_BE2">Disc Stal</option>
                    <option value="strad" data-url="Strad_JE2_BE2">Disc Strad</option>
                    <option value="ward" data-url="Ward_JE2_BE2">Disc Ward</option>
                    <option value="11" data-url="11_JE2_BE2">Disc 11</option>
                    <option value="wait" data-url="Wait_JE2_BE2">Disc Wait</option>
                    <option value="otherside" data-url="Otherside_JE1_BE1">Otherside</option>
                    <option value="pigstep" data-url="Pigstep_JE1_BE1">Pigstep</option>
                    <option value="5" data-url="5_JE1_BE1">Disc 5</option>
                    <option value="relic" data-url="Relic_JE1_BE1">Relic</option>
                    <option value="precipice" data-url="Precipice_JE1_BE1">Precipice</option>
                    <option value="creator" data-url="Creator_JE1_BE1">Creator</option>
                    <option value="creator_music_box" data-url="Creator_%28Music_Box%29_JE1_BE1">Music Box</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>TỆP ÂM THANH (AUDIO SOURCE):</label>
            <label for="audioInput" class="file-upload-btn" id="fileLabel">BẤM ĐỂ CHỌN FILE NHẠC</label>
            <input type="file" id="audioInput" accept=".mp3,.ogg,.wav,audio/*">
        </div>
    </div>

    <button class="btn-craft" onclick="craftPack()">BẮT ĐẦU CHẾ TẠO</button>
    <div id="status" class="status">Sẵn sàng.</div>

    <div class="footer">Created by Bindz • Minecraft Resource Tool</div>
</div>

<script>
    const discSelect = document.getElementById('discSelect');
    const discPreview = document.getElementById('discPreview');
    const audioInput = document.getElementById('audioInput');
    const fileLabel = document.getElementById('fileLabel');
    const status = document.getElementById('status');

    // Cập nhật ảnh đĩa theo lựa chọn
    discSelect.addEventListener('change', () => {
        const urlPart = discSelect.options[discSelect.selectedIndex].dataset.url;
        discPreview.src = `https://minecraft.wiki/images/Music_Disc_${urlPart}.png`;
    });

    // Hiển thị tên file đã chọn
    audioInput.addEventListener('change', () => {
        if (audioInput.files[0]) {
            fileLabel.innerText = "ĐÃ CHỌN: " + audioInput.files[0].name.substring(0, 15) + "...";
            fileLabel.style.color = "#3cf03c";
        }
    });

    // Tạo mã UUID ngẫu nhiên hoàn toàn mới (Theo yêu cầu của bạn)
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    async function craftPack() {
        const file = audioInput.files[0];
        const packNameInput = document.getElementById('packName').value.trim() || "BindzDiscPack";
        const versionStr = document.getElementById('versionSelect').value;
        const targetDisc = discSelect.value;

        if (!file) {
            status.innerText = "LỖI: HÃY CHỌN FILE NHẠC TRƯỚC!";
            status.style.color = "#ff5555";
            return;
        }

        status.innerText = "ĐANG XỬ LÝ ÂM THANH...";
        status.style.color = "#3f3f3f";

        try {
            const zip = new JSZip();
            const audioData = await file.arrayBuffer();
            const versionParts = versionStr.split('.').map(Number);

            // 1. Tạo Manifest.json chuẩn chuyên nghiệp
            const manifest = {
                "format_version": 2,
                "header": {
                    "description": `Custom Music Disc Pack - Version ${versionStr} - Cre: Bindz`,
                    "name": packNameInput,
                    "uuid": generateUUID(), // UUID mới 1
                    "version": [1, 0, 0],
                    "min_engine_version": versionParts
                },
                "modules": [
                    {
                        "description": "Audio resources",
                        "type": "resources",
                        "uuid": generateUUID(), // UUID mới 2
                        "version": [1, 0, 0]
                    }
                ]
            };

            // Tạo thư mục gốc bên trong ZIP để tránh rối khi giải nén
            const rootFolder = zip.folder(packNameInput);
            rootFolder.file("manifest.json", JSON.stringify(manifest, null, 4));

            // 2. Tạo cấu trúc thư mục âm thanh (Dual-Path cho chắc chắn)
            const pathA = rootFolder.folder("sounds/music/game/records");
            pathA.file(targetDisc + ".ogg", audioData);

            const pathB = rootFolder.folder("sounds/sounds/music/game/records");
            pathB.file(targetDisc + ".ogg", audioData);

            // 3. Đóng gói và tải về
            const content = await zip.generateAsync({type: "blob"});
            const downloadUrl = URL.createObjectURL(content);
            const link = document.createElement("a");
            link.href = downloadUrl;
            link.download = `${packNameInput}_${versionStr}.zip`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            status.innerText = "CHẾ TẠO THÀNH CÔNG!";
            status.style.color = "#3c8527";
        } catch (err) {
            status.innerText = "CÓ LỖI XẢY RA!";
            status.style.color = "#ff5555";
            console.error(err);
        }
    }
</script>
</body>
</html>
