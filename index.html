<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Minecraft Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* iOS Style - San Francisco-like Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --ios-blur: blur(30px);
            --ios-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #007AFF; /* Apple Blue */
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #000 url('https://w.wallhaven.cc/full/85/wallhaven-85m88y.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Nền lướt sóng nhẹ nhàng kiểu Apple */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, rgba(0,122,255,0.2), rgba(255,45,85,0.1));
            z-index: -1; animation: bgWave 15s infinite alternate;
        }

        @keyframes bgWave {
            0% { opacity: 0.5; } 100% { opacity: 0.8; }
        }

        .ios-card {
            background: var(--ios-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 45px; /* Bo góc cực tròn kiểu iOS */
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            width: 90%; max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 100;
            text-align: center;
        }

        /* Chữ shader lướt sóng Pro Max */
        .shader-title {
            font-weight: 800; font-size: 2.2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #fff, #007AFF, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 3s linear infinite;
        }

        @keyframes textFlow {
            to { background-position: 200% center; }
        }

        .menu-stack { display: flex; flex-direction: column; gap: 15px; text-align: left; }

        label { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.6); margin-left: 15px; }

        input, select {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 16px 20px;
            border-radius: 20px;
            color: white; font-size: 1rem;
            width: 100%; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }

        input:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 0 3px var(--accent-color); }

        .preview-circle {
            width: 120px; height: 120px; border-radius: 30px;
            background: rgba(0,0,0,0.3); margin: 20px auto;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        .btn-ios {
            background: #fff; color: #000;
            border: none; padding: 18px; border-radius: 22px;
            width: 100%; font-weight: 700; font-size: 1.1rem;
            margin-top: 25px; cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-ios:active { transform: scale(0.96); background: rgba(255,255,255,0.8); }

        /* Loading */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:600;">Processing...</p>
</div>

<div class="ios-card">
    <h1 class="shader-title">Converter Pro</h1>
    
    <div class="menu-stack">
        <label>PROJECT NAME</label>
        <input type="text" id="pName" placeholder="Tên Pack (không dấu/khoảng cách)">

        <label>DEVICE & VERSION</label>
        <div style="display:flex; gap:10px;">
            <select id="device">
                <option value="ios">iOS</option>
                <option value="pc">PC</option>
                <option value="adr">Android</option>
            </select>
            <select id="ver">
                <option value="1.21.0">1.21</option>
                <option value="1.20.0">1.20</option>
            </select>
        </div>

        <label>COORDINATES (X, Z)</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="posX" value="0">
            <input type="number" id="posZ" value="0">
        </div>

        <label>IMAGE SOURCE</label>
        <input type="file" id="imgInp" accept="image/*">
    </div>

    <div class="preview-circle">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <button class="btn-ios" onclick="convert()">Convert to .mcpack</button>
</div>

<script>
    // UUID Generator (Unique every time)
    function genUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const imgInp = document.getElementById('imgInp');

    imgInp.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                canvas.width = 64; canvas.height = 64;
                ctx.drawImage(img, 0, 0, 64, 64);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function convert() {
        if(!imgInp.files[0]) return alert("Chọn ảnh!");
        document.getElementById('loader').style.display = 'flex';

        const pName = document.getElementById('pName').value.toLowerCase().replace(/\s/g, '_') || "pixel_art";
        const startX = parseInt(document.getElementById('posX').value);
        const startZ = parseInt(document.getElementById('posZ').value);
        const mcVer = document.getElementById('ver').value.split('.').map(Number);
        
        const zip = new JSZip();
        const functions = zip.folder("functions");

        // --- 1. Tạo file pixel chính ---
        let cmds = [];
        const data = ctx.getImageData(0,0,64,64).data;
        // Map màu đơn giản (Ví dụ: len trắng)
        for(let y=0; y<64; y++){
            for(let x=0; x<64; x++){
                const i = (y*64+x)*4;
                if(data[i+3] < 128) continue;
                cmds.push(`setblock ${startX+x} 150 ${startZ+y} concrete ${Math.floor(Math.random()*15)}`);
            }
        }
        // Lưu <tên_bất_kỳ>.mcfunction vào folder functions
        functions.file(`${pName}.mcfunction`, cmds.join('\n'));

        // --- 2. run_all.mcfunction ---
        functions.file("run_all.mcfunction", `function ${pName}`);

        // --- 3. tick.mcfunction (Sửa: Gọi trực tiếp file pixel) ---
        functions.file("tick.mcfunction", `execute @a[tag=!built] ~ ~ ~ function ${pName}\ntag @a[tag=!built] add built`);

        // --- 4. tick.json (Cấu trúc bắt buộc để game nhận diện) ---
        functions.file("tick.json", JSON.stringify({"values":["tick"]}, null, 4));

        // --- 5. Manifest.json (UUID Random) ---
        const manifest = {
            format_version: 2,
            header: {
                name: pName,
                description: "iOS Style Pixel Art Pack",
                uuid: genUUID(),
                version: [1, 0, 0],
                min_engine_version: mcVer
            },
            modules: [{
                type: "data",
                uuid: genUUID(),
                version: [1, 0, 0]
            }]
        };
        zip.file("manifest.json", JSON.stringify(manifest, null, 4));

        const blob = await zip.generateAsync({type:"blob"});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${pName}.mcpack`;
        a.click();
        
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
