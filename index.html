<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Disc Maker - Fix Select File</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraft-ia');
        body { background: #313131; color: white; font-family: 'Minecraftia', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #c6c6c6; border: 4px solid #000; border-top-color: #fff; border-left-color: #fff; padding: 20px; width: 90%; max-width: 500px; box-shadow: 8px 8px 0px rgba(0,0,0,0.4); }
        h1 { color: #3f3f3f; text-shadow: 2px 2px #fff; text-align: center; font-size: 0.9rem; margin-bottom: 15px; }
        .section { background: #8b8b8b; border: 2px solid #373737; border-top-color: #fff; border-left-color: #fff; padding: 12px; margin-bottom: 10px; color: #000; }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 10px; background: #000; border: 2px solid #fff; color: #3cf03c; font-family: 'Minecraftia', sans-serif; box-sizing: border-box; font-size: 0.8rem; }
        /* Tùy chỉnh nút chọn file cho dễ bấm */
        .file-input-wrapper { margin-top: 5px; }
        input[type="file"] { width: 100%; color: #000; font-size: 0.7rem; background: #eee; padding: 5px; border: 1px inset #000; }
        .disc-preview-box { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .disc-icon { width: 42px; height: 42px; image-rendering: pixelated; background: #555; border: 2px solid #000; padding: 4px; }
        button#craft { width: 100%; padding: 15px; background: #3c8527; border: 3px solid #000; border-top-color: #5fb343; border-left-color: #5fb343; color: white; font-family: 'Minecraftia', sans-serif; cursor: pointer; margin-top: 10px; text-shadow: 2px 2px #000; }
        button#craft:active { border-top-color: #000; border-left-color: #000; background: #2d661e; }
        #status { text-align: center; font-size: 0.65rem; margin-top: 10px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>Disc Maker (Fixed Selection)</h1>

    <div class="section">
        <label>Tên Pack (Ví dụ: NhacCuaTui):</label>
        <input type="text" id="packName" placeholder="BindzDiscPack">
    </div>

    <div class="section">
        <label>Chọn nhạc (MP3, OGG, WAV...):</label>
        <div class="file-input-wrapper">
            <input type="file" id="inputFile" accept=".mp3,audio/*">
        </div>
    </div>

    <div class="section">
        <label>Thay thế đĩa trong game:</label>
        <div class="disc-preview-box">
            <select id="discSelect">
                <option value="13" data-url="13_JE2_BE2">Disc 13</option>
                <option value="cat" data-url="Cat_JE2_BE2">Disc Cat</option>
                <option value="blocks" data-url="Blocks_JE2_BE2">Disc Blocks</option>
                <option value="chirp" data-url="Chirp_JE2_BE2">Disc Chirp</option>
                <option value="far" data-url="Far_JE2_BE2">Disc Far</option>
                <option value="mall" data-url="Mall_JE2_BE2">Disc Mall</option>
                <option value="mellohi" data-url="Mellohi_JE2_BE2">Disc Mellohi</option>
                <option value="stal" data-url="Stal_JE2_BE2">Disc Stal</option>
                <option value="strad" data-url="Strad_JE2_BE2">Disc Strad</option>
                <option value="ward" data-url="Ward_JE2_BE2">Disc Ward</option>
                <option value="11" data-url="11_JE2_BE2">Disc 11</option>
                <option value="wait" data-url="Wait_JE2_BE2">Disc Wait</option>
                <option value="pigstep" data-url="Pigstep_JE1_BE1">Pigstep</option>
                <option value="otherside" data-url="Otherside_JE1_BE1">Otherside</option>
                <option value="5" data-url="5_JE1_BE1">Disc 5</option>
                <option value="relic" data-url="Relic_JE1_BE1">Relic</option>
                <option value="precipice" data-url="Precipice_JE1_BE1">Precipice</option>
                <option value="creator" data-url="Creator_JE1_BE1">Creator</option>
            </select>
            <img id="discImg" src="https://minecraft.wiki/images/Music_Disc_13_JE2_BE2.png" class="disc-icon">
        </div>
    </div>

    <button id="craft" onclick="handleCraft()">CHẾ TẠO (.ZIP)</button>
    <div id="status">Sẵn sàng!</div>
</div>

<script>
    const discSelect = document.getElementById('discSelect');
    const discImg = document.getElementById('discImg');

    discSelect.addEventListener('change', () => {
        const urlSuffix = discSelect.options[discSelect.selectedIndex].dataset.url;
        discImg.src = `https://minecraft.wiki/images/Music_Disc_${urlSuffix}.png`;
    });

    // UUID luôn khác nhau mỗi lần nhấn nút (Theo yêu cầu)
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    async function handleCraft() {
        const status = document.getElementById('status');
        const btn = document.getElementById('craft');
        const fileInput = document.getElementById('inputFile');
        const packName = document.getElementById('packName').value || "BindzPack";
        
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("Bạn chưa chọn file nhạc hoặc trình duyệt không cho phép truy cập file!");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Đang xử lý dữ liệu...";

            const file = fileInput.files[0];
            const audioBuffer = await file.arrayBuffer();
            
            status.innerText = "Đang đóng gói ZIP...";
            const zip = new JSZip();

            // Manifest với UUID ngẫu nhiên mới hoàn toàn
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": packName,
                    "description": "Music Pack by Bindz",
                    "uuid": generateUUID(), 
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 16, 0]
                },
                "modules": [{
                    "description": "Audio Module",
                    "type": "resources",
                    "uuid": generateUUID(), 
                    "version": [1, 0, 0]
                }]
            };

            zip.file("manifest.json", JSON.stringify(manifest, null, 4));
            const folder = zip.folder("sounds/music/game/records");
            
            // Đặt tên file đúng định dạng game nhận diện
            folder.file(discSelect.value + ".ogg", audioBuffer);

            const blob = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = packName + ".zip";
            link.click();

            status.innerText = "HOÀN THÀNH!";
            status.style.color = "#3cf03c";
        } catch (err) {
            console.error(err);
            status.innerText = "LỖI: " + err.message;
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
