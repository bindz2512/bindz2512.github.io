<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Disc Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraft-ia');
        body { background: #313131; color: white; font-family: 'Minecraftia', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: #c6c6c6; border: 4px solid #000; border-top-color: #fff; border-left-color: #fff; padding: 15px; width: 100%; max-width: 450px; box-shadow: 8px 8px 0px rgba(0,0,0,0.4); }
        h1 { color: #3f3f3f; text-shadow: 2px 2px #fff; text-align: center; font-size: 0.85rem; margin: 0 0 15px 0; }
        .section { background: #8b8b8b; border: 2px solid #373737; border-top-color: #fff; border-left-color: #fff; padding: 10px; margin-bottom: 10px; color: #000; }
        label { display: block; margin-bottom: 5px; font-size: 0.7rem; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 8px; background: #000; border: 2px solid #fff; color: #3cf03c; font-family: 'Minecraftia', sans-serif; box-sizing: border-box; font-size: 0.75rem; }
        input[type="file"] { width: 100%; color: #000; font-size: 0.65rem; background: #ddd; padding: 5px; border: 1px inset #000; cursor: pointer; }
        .flex-row { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .disc-icon { width: 40px; height: 40px; image-rendering: pixelated; background: #555; border: 2px solid #000; padding: 2px; }
        button#craft { width: 100%; padding: 12px; background: #3c8527; border: 3px solid #000; border-top-color: #5fb343; border-left-color: #5fb343; color: white; font-family: 'Minecraftia', sans-serif; cursor: pointer; margin-top: 5px; text-shadow: 2px 2px #000; font-size: 0.8rem; }
        button#craft:active { border-top-color: #000; border-left-color: #000; background: #2d661e; }
        #status { text-align: center; font-size: 0.6rem; margin-top: 10px; color: #444; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Disc Maker v1.21 (Universal)</h1>

    <div class="section">
        <label>Tên Gói (Không dấu):</label>
        <input type="text" id="packName" placeholder="MyMusicPack">
    </div>

    <div class="section">
        <label>Phiên bản Minecraft:</label>
        <select id="versionSelect">
            <option value="1.21">Minecraft 1.21+</option>
            <option value="1.20">Minecraft 1.20</option>
            <option value="1.19">Minecraft 1.19</option>
            <option value="1.18">Minecraft 1.18</option>
            <option value="1.17">Minecraft 1.17</option>
            <option value="1.16">Minecraft 1.16</option>
        </select>
    </div>

    <div class="section">
        <label>Chọn file nhạc (MP3, WAV, OGG...):</label>
        <input type="file" id="inputFile" accept="audio/*,.mp3,.ogg,.wav">
    </div>

    <div class="section">
        <label>Thay thế đĩa nào:</label>
        <div class="flex-row">
            <select id="discSelect">
                <option value="13" data-url="13_JE2_BE2">Disc 13</option>
                <option value="cat" data-url="Cat_JE2_BE2">Disc Cat</option>
                <option value="blocks" data-url="Blocks_JE2_BE2">Disc Blocks</option>
                <option value="chirp" data-url="Chirp_JE2_BE2">Disc Chirp</option>
                <option value="far" data-url="Far_JE2_BE2">Disc Far</option>
                <option value="mall" data-url="Mall_JE2_BE2">Disc Mall</option>
                <option value="mellohi" data-url="Mellohi_JE2_BE2">Disc Mellohi</option>
                <option value="stal" data-url="Stal_JE2_BE2">Disc Stal</option>
                <option value="strad" data-url="Strad_JE2_BE2">Disc Strad</option>
                <option value="ward" data-url="Ward_JE2_BE2">Disc Ward</option>
                <option value="11" data-url="11_JE2_BE2">Disc 11</option>
                <option value="wait" data-url="Wait_JE2_BE2">Disc Wait</option>
                <option value="pigstep" data-url="Pigstep_JE1_BE1">Pigstep</option>
                <option value="otherside" data-url="Otherside_JE1_BE1">Otherside</option>
                <option value="5" data-url="5_JE1_BE1">Disc 5</option>
                <option value="relic" data-url="Relic_JE1_BE1">Relic</option>
                <option value="precipice" data-url="Precipice_JE1_BE1">Precipice</option>
                <option value="creator" data-url="Creator_JE1_BE1">Creator</option>
                <option value="creator_music_box" data-url="Creator_%28Music_Box%29_JE1_BE1">Music Box</option>
            </select>
            <img id="discImg" src="https://minecraft.wiki/images/Music_Disc_13_JE2_BE2.png" class="disc-icon">
        </div>
    </div>

    <button id="craft" onclick="handleCraft()">CHẾ TẠO (.ZIP)</button>
    <div id="status">Sẵn sàng! Hãy chọn file nhạc của bạn.</div>
</div>

<script>
    // Cập nhật ảnh đĩa khi chọn
    document.getElementById('discSelect').addEventListener('change', function() {
        const urlSuffix = this.options[this.selectedIndex].dataset.url;
        document.getElementById('discImg').src = `https://minecraft.wiki/images/Music_Disc_${urlSuffix}.png`;
    });

    // Hàm tạo UUID ngẫu nhiên theo yêu cầu (luôn khác nhau)
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    async function handleCraft() {
        const status = document.getElementById('status');
        const btn = document.getElementById('craft');
        const fileInput = document.getElementById('inputFile');
        const packName = document.getElementById('packName').value.trim() || "BindzMusic";
        const selectedVer = document.getElementById('versionSelect').value;
        const discName = document.getElementById('discSelect').value;
        
        if (!fileInput.files[0]) {
            alert("Vui lòng chọn 1 file nhạc trước!");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Đang xử lý âm thanh...";

            const file = fileInput.files[0];
            const audioBuffer = await file.arrayBuffer();
            const zip = new JSZip();

            // Manifest với UUID ngẫu nhiên mới hoàn toàn
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": `${packName} [${selectedVer}]`,
                    "description": `Đĩa nhạc tùy chỉnh cho bản ${selectedVer}`,
                    "uuid": generateUUID(),
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 16, 0]
                },
                "modules": [{
                    "description": "Audio",
                    "type": "resources",
                    "uuid": generateUUID(),
                    "version": [1, 0, 0]
                }]
            };

            zip.file("manifest.json", JSON.stringify(manifest, null, 4));

            // Logic đa phiên bản: Đưa nhạc vào cả 2 đường dẫn để chắc chắn hoạt động
            // Đường dẫn 1: Cho bản cũ
            const pathOld = zip.folder("sounds/music/game/records");
            pathOld.file(discName + ".ogg", audioBuffer);
            
            // Đường dẫn 2: Cho bản mới (một số bản Bedrock mới yêu cầu cấu trúc này)
            const pathNew = zip.folder("sounds/sounds/music/game/records");
            pathNew.file(discName + ".ogg", audioBuffer);

            // Xuất ZIP
            const blob = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${packName}_MC${selectedVer}.zip`;
            link.click();

            status.innerText = "HOÀN THÀNH!\nNếu là iOS: Hãy giải nén file ZIP rồi đưa vào thư mục resource_packs.";
            status.style.color = "#3cf03c";
        } catch (err) {
            status.innerText = "LỖI: " + err.message;
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
