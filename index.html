<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Pixel Art Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;700&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, #050505, #1a0a2e, #050505);
            background-size: 400% 400%;
            animation: waveBackground 15s ease infinite;
            font-family: 'Roboto', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow-x: hidden;
        }

        @keyframes waveBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Pro Max */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 50px;
            width: 850px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255,255,255,0.05);
            z-index: 999;
            position: relative;
        }

        /* Shader Text Lướt Sóng */
        .shader-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 25%, #7000ff 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shaderWave 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.6));
        }

        @keyframes shaderWave {
            to { background-position: 200% center; }
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .input-item { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: 700; color: #4facfe; letter-spacing: 1px; font-size: 0.9rem;}

        input, select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7000ff;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
            transform: scale(1.02);
        }

        .preview-area {
            height: 200px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            border: 2px dashed rgba(79, 172, 254, 0.3);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 30px; overflow: hidden;
        }

        #pixelCanvas { max-height: 100%; image-rendering: pixelated; display: none; }

        .btn-convert {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(90deg, #7000ff, #4facfe);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4);
        }

        .btn-convert:hover {
            letter-spacing: 5px;
            box-shadow: 0 15px 40px rgba(79, 172, 254, 0.6);
            transform: translateY(-5px);
        }

        /* Loading Animation */
        #loader {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .bar-container { width: 300px; height: 6px; background: #222; border-radius: 10px; margin-top: 20px;}
        .bar-fill { width: 0%; height: 100%; background: #4facfe; border-radius: 10px; box-shadow: 0 0 15px #4facfe; transition: 0.3s;}
    </style>
</head>
<body>

<div id="loader">
    <h2 class="shader-title" style="font-size: 1.5rem;">ĐANG COMPILING...</h2>
    <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
</div>

<div class="glass-panel">
    <h1 class="shader-title">MINECRAFT SHADER PRO</h1>
    
    <div class="menu-grid">
        <div class="input-item">
            <label>THIẾT BỊ (DEVICE)</label>
            <select id="device">
                <option value="pc">PC (Windows 10/11)</option>
                <option value="adr">ANDROID</option>
                <option value="ios">IOS (iPhone/iPad)</option>
            </select>
        </div>
        <div class="input-item">
            <label>PHIÊN BẢN (VERSION)</label>
            <select id="mcVer">
                <option value="1.18.0">Minecraft 1.18</option>
                <option value="1.19.0">Minecraft 1.19</option>
                <option value="1.20.0">Minecraft 1.20</option>
                <option value="1.21.0">Minecraft 1.21</option>
            </select>
        </div>
        <div class="input-item">
            <label>TÊN PROJECT</label>
            <input type="text" id="pName" placeholder="MyAwesomeArt">
        </div>
        <div class="input-item">
            <label>ẢNH NGUỒN</label>
            <input type="file" id="imgInp" accept="image/*">
        </div>
        <div class="input-item">
            <label>TỌA ĐỘ X (Z tương ứng)</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="posX" value="0" placeholder="X">
                <input type="number" id="posZ" value="0" placeholder="Z">
            </div>
        </div>
        <div class="input-item">
            <label>ĐỘ CAO Y (CỐ ĐỊNH)</label>
            <input type="text" value="150" disabled>
        </div>
    </div>

    <div class="preview-area">
        <span id="txt">PREVIEW PIXEL ART</span>
        <canvas id="pixelCanvas"></canvas>
    </div>

    <button class="btn-convert" onclick="process()">CONVERT NOW</button>
</div>

<script>
    const palette = [
        {n:'white_concrete', r:207, g:213, b:214}, {n:'black_concrete', r:8, g:10, b:15},
        {n:'red_concrete', r:142, g:32, b:32}, {n:'blue_concrete', r:45, g:47, b:143},
        {n:'yellow_concrete', r:240, g:175, b:21}, {n:'lime_concrete', r:94, g:168, b:24}
    ];

    function getUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    const imgInp = document.getElementById('imgInp');
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');

    imgInp.onchange = e => {
        const reader = new FileReader();
        reader.onload = event => {
            const img = new Image();
            img.onload = () => {
                const size = 100; // Giới hạn size để mượt
                canvas.width = size; canvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                canvas.style.display = 'block';
                document.getElementById('txt').style.display = 'none';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function process() {
        if(!imgInp.files[0]) return alert("Chọn ảnh cái đã!");
        
        const loader = document.getElementById('loader');
        const bar = document.getElementById('bar');
        loader.style.display = 'flex';
        
        const pName = document.getElementById('pName').value || "PixelArt";
        const device = document.getElementById('device').value;
        const ver = document.getElementById('mcVer').value.split('.').map(Number);
        const startX = parseInt(document.getElementById('posX').value);
        const startZ = parseInt(document.getElementById('posZ').value);
        const randomFileName = "build_" + Math.random().toString(36).substring(7);

        const zip = new JSZip();
        
        // 1. Tạo file xây dựng pixel chính
        bar.style.width = "30%";
        let commands = [];
        const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        for(let y=0; y<canvas.height; y++){
            for(let x=0; x<canvas.width; x++){
                const i = (y*canvas.width+x)*4;
                if(data[i+3] < 128) continue;
                let best = palette[0], min = Infinity;
                palette.forEach(b => {
                    let d = Math.hypot(data[i]-b.r, data[i+1]-b.g, data[i+2]-b.b);
                    if(d < min) { min = d; best = b; }
                });
                commands.push(`setblock ${startX + x} 150 ${startZ + y} ${best.n}`);
            }
        }

        const funcs = zip.folder("functions");
        funcs.file(`${randomFileName}.mcfunction`, commands.join('\n'));

        // 2. run_all.mcfunction
        funcs.file("run_all.mcfunction", `function ${randomFileName}`);

        // 3. tick.mcfunction (Logic: Chạy 1 lần duy nhất bằng tag)
        funcs.file("tick.mcfunction", `execute @a[tag=!built] ~ ~ ~ function run_all\ntag @a[tag=!built] add built`);

        // 4. tick.json
        funcs.file("tick.json", JSON.stringify({"values":["tick"]}, null, 4));

        // 5. Manifest.json (Custom theo Device)
        bar.style.width = "60%";
        const manifest = {
            format_version: 2,
            header: {
                name: `${pName} (${device.toUpperCase()})`,
                description: "AI Generated Pixel Art",
                uuid: getUUID(),
                version: [1, 0, 0],
                min_engine_version: ver
            },
            modules: [{
                type: "data",
                uuid: getUUID(),
                version: [1, 0, 0]
            }]
        };
        zip.file("manifest.json", JSON.stringify(manifest, null, 4));

        // Đóng gói mcpack
        bar.style.width = "90%";
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${pName}.mcpack`;
        link.click();

        bar.style.width = "100%";
        setTimeout(() => loader.style.display = 'none', 500);
    }
</script>
</body>
</html>
